<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrettyQR Logo Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .qr-container {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .qr-item {
            text-align: center;
        }
        .qr-item svg {
            border: 1px solid #ccc;
            margin: 10px 0;
        }
        .info {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
        }
        .logo-input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>PrettyQR Logo Integration Test</h1>
    
    <div class="test-section">
        <h2>Logo Input</h2>
        <input type="text" id="logo-url" class="logo-input" 
               placeholder="Enter logo URL or paste SVG content" 
               value="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=040">
        <br>
        <button class="btn" onclick="generateQR()">Generate QR with Logo</button>
        <button class="btn" onclick="generateWithoutLogo()">Generate QR without Logo</button>
    </div>

    <div class="test-section">
        <h2>QR Code Results</h2>
        <div class="qr-container" id="qr-container">
            <!-- QR codes will be generated here -->
        </div>
    </div>

    <div class="test-section">
        <h2>Test Different Logo Sizes</h2>
        <div class="qr-container" id="size-test-container">
            <!-- Size test QR codes will be generated here -->
        </div>
    </div>

    <script type="module">
        import { PrettyQR } from './dist/index.js';

        // Test with the Bitcoin logo
        const bitcoinLogo = 'https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=040';
        
        // Test SVG content (simplified Bitcoin logo)
        const bitcoinSVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M23.638 14.904c-1.602 6.43-8.113 10.34-14.542 8.736C2.67 22.05-1.244 15.525.362 9.105 1.962 2.67 8.475-1.243 14.9.358c6.43 1.605 10.342 8.115 8.738 14.546z" fill="#f7931a"/>
            <path d="M17.472 9.169c.16-1.08-.6-1.66-1.62-2.05l.33-1.32-1.81-.45-.32 1.29c-.48-.12-.98-.23-1.48-.34l.33-1.31-1.81-.45-.33 1.32c-.39-.09-.77-.17-1.14-.26l.01-.05-1.36-.34-.26 1.04s.73.17.71.18c.4.1.47.36.46.57l-1.5 5.98c-.04.1-.14.25-.37.19.01.01-.72-.18-.72-.18l-.49 1.15 1.29.32c.6.15 1.06.29 1.59.35l-.34 1.36 1.81.45.33-1.32c.5.14.98.25 1.48.35l-.33 1.32 1.81.45.34-1.36c3.28.62 5.75.37 6.79-2.6.84-2.4-.04-3.78-1.78-4.68 1.27-.29 2.22-1.12 2.47-2.84zm-2.95 6.55c-.6 2.4-4.67 1.1-5.99.62l1.07-4.27c1.32.48 5.52 1.44 4.92 3.65zm.6-6.33c-.54 2.17-3.88 1.07-4.97.63l.97-3.87c1.09.44 4.52 1.25 4 3.24z" fill="#fff"/>
        </svg>`;

        function generateQR() {
            const logoUrl = document.getElementById('logo-url').value;
            const container = document.getElementById('qr-container');
            
            try {
                const qr = new PrettyQR({
                    text: 'Bitcoin Logo Test - https://bitcoin.org',
                    size: 300,
                    logo: {
                        src: logoUrl,
                        size: 60,
                        margin: 3,
                        borderRadius: 8,
                        backgroundColor: 'white'
                    },
                    style: {
                        background: '#f8f9fa',
                        foreground: '#000000',
                        patternStyle: 'rounded',
                        eyeStyle: 'rounded'
                    }
                });

                container.innerHTML = `
                    <div class="qr-item">
                        <h3>With Logo</h3>
                        <div>${qr.toSVG()}</div>
                        <div class="info">
                            Logo: ${logoUrl.substring(0, 50)}...<br>
                            Size: 60px, Margin: 3px, Border Radius: 8px
                        </div>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<div class="info" style="color: red;">Error: ${error.message}</div>`;
            }
        }

        function generateWithoutLogo() {
            const container = document.getElementById('qr-container');
            
            const qr = new PrettyQR({
                text: 'Bitcoin Logo Test - https://bitcoin.org',
                size: 300,
                style: {
                    background: '#f8f9fa',
                    foreground: '#000000',
                    patternStyle: 'rounded',
                    eyeStyle: 'rounded'
                }
            });

            container.innerHTML = `
                <div class="qr-item">
                    <h3>Without Logo</h3>
                    <div>${qr.toSVG()}</div>
                    <div class="info">
                        Same QR code without logo for comparison
                    </div>
                </div>
            `;
        }

        function testDifferentSizes() {
            const container = document.getElementById('size-test-container');
            const sizes = [30, 45, 60, 75];
            
            let html = '';
            sizes.forEach(size => {
                try {
                    const qr = new PrettyQR({
                        text: `Size Test ${size}px`,
                        size: 200,
                        logo: {
                            src: bitcoinSVG,
                            size: size,
                            margin: 2,
                            borderRadius: size / 8,
                            backgroundColor: 'white'
                        },
                        style: {
                            background: '#ffffff',
                            foreground: '#000000',
                            patternStyle: 'square',
                            eyeStyle: 'square'
                        }
                    });

                    html += `
                        <div class="qr-item">
                            <h3>${size}px Logo</h3>
                            <div>${qr.toSVG()}</div>
                            <div class="info">Size: ${size}px</div>
                        </div>
                    `;
                } catch (error) {
                    html += `<div class="info" style="color: red;">Error with ${size}px: ${error.message}</div>`;
                }
            });
            
            container.innerHTML = html;
        }

        // Generate initial QR codes
        generateQR();
        testDifferentSizes();
    </script>
</body>
</html>
